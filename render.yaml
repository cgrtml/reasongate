services:
  - type: web
    name: reasongate-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: python run_web.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VOYAGE_API_KEY
        sync: false      # Render panelinden gizli olarak gir
      - key: ANTHROPIC_API_KEY
        sync: false      # Render panelinden gizli olarak gir
      - key: DEMO_KEY
        sync: false      # erisim kodu: belirle, sadece ?key=KODUN paylasanlar kullanir
      - key: DAILY_LIMIT
        value: "150"     # gunluk maks istek (maliyet tavani)
