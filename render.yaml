services:
  - type: web
    name: reasongate-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: python run_web.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Rule-core demo needs NO secrets. Optional overrides:
      # - key: DEMO_KEY     (restrict access to ?key=… holders)
      # - key: ANTHROPIC_API_KEY  (use a real Claude bot in /chat instead of a canned reply)
