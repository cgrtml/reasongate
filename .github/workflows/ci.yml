name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Cekirdek SIFIR-BAGIMLILIK: kurulum tek basina hicbir dis paket cekmez.
      # Bu adimin gecmesi, "kapali agda/air-gapped kurulur" iddiasinin kanitidir.
      - name: Install core (zero dependencies)
        run: pip install -e .

      - name: Core import smoke (no external deps)
        run: python -c "import reasongate; from reasongate import Shield; print('reasongate', reasongate.__version__)"

      - name: Install test tooling
        run: pip install pytest

      - name: Run tests
        run: pytest -q
